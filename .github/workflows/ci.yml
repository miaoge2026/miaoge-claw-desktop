name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '9'
      
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile  # 修复 lockfile 不匹配问题
      
      - name: Build
        run: pnpm run build
      
      - name: Test
        run: pnpm run test
